<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Telemetry Analytics - WQ System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-slate-900/95 text-white sticky top-0 z-50 backdrop-blur-md border-b border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500/10 p-2 rounded-xl text-blue-400 border border-blue-500/30 shadow-inner">
                        <i class="fa-solid fa-droplet text-lg"></i>
                    </div>
                    <span class="text-sm font-black tracking-widest text-white uppercase bg-gradient-to-r from-blue-400 to-indigo-200 bg-clip-text text-transparent">WQ-SYSTEM</span>
                </div>

                <div class="hidden md:flex items-center space-x-1 bg-slate-950/40 p-1 rounded-xl border border-slate-800/60">
                    <a href="index.html" class="text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200">Overview</a>
                    <a href="grafik.html" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-md transition-all duration-200">Analytics</a>
                    <a href="history.html" class="text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200">Data Log</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 space-y-6">
        <div class="border-b border-slate-200 pb-5">
            <h1 class="text-lg sm:text-xl font-bold text-slate-900 tracking-tight">Real-time Advanced Charts</h1>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 sm:p-6">
            <div class="w-full overflow-x-auto pb-4">
                <div class="relative h-64 sm:h-80 md:h-96" style="min-width: 2500px;">
                    <canvas id="chart-multi-parameter"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        
        const app = initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        const db = getDatabase(app);

        const ctx = document.getElementById('chart-multi-parameter').getContext('2d');
        const chartMulti = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'pH', data: [], borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.2, pointRadius: 2, borderWidth: 2 },
                { label: 'Turbidity', data: [], borderColor: '#f59e0b', backgroundColor: '#f59e0b', tension: 0.2, pointRadius: 2, borderWidth: 2 },
                { label: 'Water Level', data: [], borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.2, pointRadius: 2, borderWidth: 2 }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'top' } },
                scales: {
                    x: { ticks: { font: { size: 10 } } },
                    y: { 
                        beginAtZero: true, 
                        suggestedMax: 100, // Menghindari grafik gepeng
                        ticks: { font: { size: 10 } } 
                    }
                }
            }
        });

        // Tarik 2880 data riwayat
        const logRef = query(ref(db, 'SistemAir_Log'), limitToLast(2880));
        
        get(logRef).then((snapshot) => {
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const d = childSnapshot.val();
                    const waktu = d.timestamp ? new Date(d.timestamp * 1000).toLocaleTimeString('id-ID', { hour12: false }) : '--:--';
                    
                    chartMulti.data.labels.push(waktu);
                    chartMulti.data.datasets[0].data.push(d.pH || 0);
                    chartMulti.data.datasets[1].data.push(d.turbidity || 0);
                    chartMulti.data.datasets[2].data.push(d.tinggiAir || 0);
                });
                chartMulti.update();
            }

            // Real-time listener
            onValue(ref(db, 'SistemAir'), (snapshot) => {
                if (snapshot.exists()) {
                    const d = snapshot.val();
                    const waktu = new Date().toLocaleTimeString('id-ID', { hour12: false });

                    // Hanya tambah jika data benar-benar ada
                    if (d.pH !== undefined) {
                        chartMulti.data.labels.push(waktu);
                        chartMulti.data.datasets[0].data.push(d.pH);
                        chartMulti.data.datasets[1].data.push(d.turbidity || 0);
                        chartMulti.data.datasets[2].data.push(d.tinggiAir || 0);

                        if (chartMulti.data.labels.length > 2880) {
                            chartMulti.data.labels.shift();
                            chartMulti.data.datasets.forEach(ds => ds.data.shift());
                        }
                        chartMulti.update();
                    }
                }
            });
        });
    </script>
</body>
</html>
