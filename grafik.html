<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - WQ System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-slate-900/95 text-white sticky top-0 z-50 backdrop-blur-md border-b border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500/10 p-2 rounded-xl text-blue-400 border border-blue-500/30 shadow-inner">
                        <i class="fa-solid fa-droplet text-lg"></i>
                    </div>
                    <span class="text-sm font-black tracking-widest text-white uppercase bg-gradient-to-r from-blue-400 to-indigo-200 bg-clip-text text-transparent">WQ-SYSTEM</span>
                </div>

                <div class="hidden md:flex items-center space-x-1 bg-slate-950/40 p-1 rounded-xl border border-slate-800/60">
                    <a href="index.html" class="text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200">Overview</a>
                    <a href="speedometer.html" class="text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200">Gauges</a>
                    <a href="grafik.html" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold shadow-md transition-all duration-200">Analytics</a>
                    <a href="history.html" class="text-slate-400 hover:text-white hover:bg-slate-800/40 px-4 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200">Data Log</a>
                </div>

                <div class="hidden md:flex items-center space-x-4">
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <button onclick="logout()" class="h-9 px-4 bg-slate-800/80 hover:bg-rose-950/30 border border-slate-700/60 hover:border-rose-500/40 text-slate-300 hover:text-rose-400 rounded-xl flex items-center justify-center gap-2 text-xs font-bold transition-all duration-200 active:scale-95">
                        <i class="fa-solid fa-power-off"></i> Sign Out
                    </button>
                </div>

                <div class="flex md:hidden">
                    <button id="hamburger-btn" class="inline-flex items-center justify-center p-2 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 focus:outline-none transition-all">
                        <i id="hamburger-icon" class="fa-solid fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden border-t border-slate-800 bg-slate-900/95 backdrop-blur-lg px-4 pt-3 pb-4 space-y-2 shadow-xl">
            <a href="index.html" class="text-slate-300 hover:bg-slate-800/50 hover:text-white block px-4 py-2.5 rounded-xl text-xs font-semibold transition">
                <i class="fa-solid fa-chart-pie mr-2 text-slate-500"></i> Overview
            </a>
            <a href="speedometer.html" class="text-slate-300 hover:bg-slate-800/50 hover:text-white block px-4 py-2.5 rounded-xl text-xs font-semibold transition">
                <i class="fa-solid fa-gauge-high mr-2 text-slate-500"></i> Gauges
            </a>
            <a href="grafik.html" class="bg-blue-600 text-white block px-4 py-2.5 rounded-xl text-xs font-bold shadow-md">
                <i class="fa-solid fa-chart-area mr-2 text-blue-200"></i> Analytics
            </a>
            <a href="history.html" class="text-slate-300 hover:bg-slate-800/50 hover:text-white block px-4 py-2.5 rounded-xl text-xs font-semibold transition">
                <i class="fa-solid fa-database mr-2 text-slate-500"></i> Data Log
            </a>
            <div class="border-t border-slate-800/80 my-2 pt-2"></div>
            <button onclick="logout()" class="w-full px-4 py-2.5 bg-rose-950/20 hover:bg-rose-900/30 border border-rose-500/20 text-rose-400 rounded-xl flex items-center justify-center gap-2 text-xs font-bold transition">
                <i class="fa-solid fa-power-off"></i> Keluar Aplikasi
            </button>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 space-y-6">
        <div class="border-b border-slate-200 pb-5">
            <h1 class="text-lg sm:text-xl font-bold text-slate-900 tracking-tight">Real-time Advanced Charts</h1>
            <p class="text-[11px] sm:text-xs text-slate-500 mt-1">Garis tren fluktuasi pembacaan ketiga parameter utama sensor.</p>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 sm:p-6 space-y-6">
            <div class="flex flex-wrap items-center justify-between gap-2 border-b border-slate-100 pb-3">
                <span class="text-xs font-bold text-slate-900 flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-blue-500"></i> Datastream Waveform Multi-Sensor
                </span>
                <div class="flex gap-3 text-[10px] sm:text-[11px] font-bold">
                    <div class="flex items-center gap-1.5"><span class="h-2 w-2 rounded bg-emerald-500 inline-block"></span> pH</div>
                    <div class="flex items-center gap-1.5"><span class="h-2 w-2 rounded bg-amber-500 inline-block"></span> Kekeruhan</div>
                    <div class="flex items-center gap-1.5"><span class="h-2 w-2 rounded bg-blue-500 inline-block"></span> Level</div>
                </div>
            </div>
            
            <div class="relative w-full h-64 sm:h-80 md:h-96">
                <canvas id="chart-multi-parameter"></canvas>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-4 text-center text-[10px] sm:text-[11px] text-slate-400 font-medium mt-auto">
        &copy; 2026 WQ-SYSTEM Project by ZudiJago. All Right Reserved.
    </footer>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const hamburgerIcon = document.getElementById('hamburger-icon');
        hamburgerBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            hamburgerIcon.className = mobileMenu.classList.contains('hidden') ? "fa-solid fa-bars text-xl" : "fa-solid fa-xmark text-xl";
        });
        function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        
        const app = initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        const db = getDatabase(app);

        const ctx = document.getElementById('chart-multi-parameter').getContext('2d');
        const chartMulti = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill('--:--:--'),
                datasets: [
                    { label: 'pH', data: Array(20).fill(0), borderColor: '#10b981', tension: 0.3, pointRadius: 0, borderWidth: 2 },
                    { label: 'Turbidity', data: Array(20).fill(0), borderColor: '#f59e0b', tension: 0.3, pointRadius: 0, borderWidth: 2 },
                    { label: 'Water Level', data: Array(20).fill(0), borderColor: '#3b82f6', tension: 0.3, pointRadius: 0, borderWidth: 2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#94a3b8' } },
                    y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 }, color: '#64748b' } }
                }
            }
        });

        onValue(ref(db, 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const d = snapshot.val();
                const waktu = new Date().toLocaleTimeString('id-ID', { hour12: false });

                chartMulti.data.labels.push(waktu);
                chartMulti.data.datasets[0].data.push(d.pH || 0);
                chartMulti.data.datasets[1].data.push(d.turbidity || 0);
                chartMulti.data.datasets[2].data.push(d.tinggiAir || 0);

                if (chartMulti.data.labels.length > 20) {
                    chartMulti.data.labels.shift();
                    chartMulti.data.datasets[0].data.shift();
                    chartMulti.data.datasets[1].data.shift();
                    chartMulti.data.datasets[2].data.shift();
                }
                chartMulti.update();
            }
        });
    </script>
</body>
</html>
