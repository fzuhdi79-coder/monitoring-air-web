    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 space-y-6">
        <div class="border-b border-slate-200 pb-5 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
            <div>
                <h1 class="text-lg sm:text-xl font-bold text-slate-900 tracking-tight">Advanced Graphical History</h1>
                <p class="text-[11px] sm:text-xs text-slate-500 mt-1">Gunakan kombinasi kalender dan timeframe untuk analisa tingkat lanjut.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 self-start lg:self-center">
                <div class="flex items-center gap-2 bg-white border border-slate-200 p-1.5 rounded-xl shadow-sm">
                    <div class="flex items-center space-x-2 px-1.5 py-0.5 border-r border-slate-200">
                        <i class="fa-regular fa-calendar text-slate-400 text-xs"></i>
                        <input type="date" id="filter-tanggal-grafik" onchange="gantiTanggalGrafik()" class="bg-transparent text-xs font-semibold text-slate-700 outline-none cursor-pointer">
                    </div>

                    <div class="flex items-center space-x-1 px-1">
                        <i class="fa-regular fa-clock text-slate-400 text-xs mr-1"></i>
                        <input type="time" id="filter-jam-mulai" class="bg-transparent text-xs font-semibold text-slate-600 outline-none cursor-pointer" title="Jam Mulai">
                        <span class="text-slate-400 text-[10px] font-bold px-1">s/d</span>
                        <input type="time" id="filter-jam-selesai" class="bg-transparent text-xs font-semibold text-slate-600 outline-none cursor-pointer" title="Jam Selesai">
                        <button onclick="terapkanFilterJam()" class="ml-2 px-2.5 py-1 bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold rounded-lg transition shadow-sm active:scale-95">
                            Cari
                        </button>
                    </div>
                </div>

                <div class="flex items-center bg-slate-200/70 p-1 rounded-xl border border-slate-200 shadow-inner" id="timeframe-container">
                    <button onclick="ubahTimeframe('15p')" id="tf-15p" class="px-3 py-1 rounded-lg text-[11px] font-bold transition-all duration-200 bg-white text-slate-900 shadow-sm border border-slate-200/50">Live</button>
                    <button onclick="ubahTimeframe('1h')" id="tf-1h" class="px-3 py-1 rounded-lg text-[11px] font-bold transition-all duration-200 text-slate-600 hover:text-slate-900">1 Jam</button>
                    <button onclick="ubahTimeframe('6h')" id="tf-6h" class="px-3 py-1 rounded-lg text-[11px] font-bold transition-all duration-200 text-slate-600 hover:text-slate-900">6 Jam</button>
                    <button onclick="ubahTimeframe('all')" id="tf-all" class="px-3 py-1 rounded-lg text-[11px] font-bold transition-all duration-200 text-slate-600 hover:text-slate-900">24 Jam (Semua)</button>
                </div>

                <div class="flex gap-1.5">
                    <button onclick="resetSkalaGrafik()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-white text-[11px] font-bold rounded-xl transition active:scale-95 shadow-md flex items-center gap-1" title="Reset Posisi Grafik">
                        <i class="fa-solid fa-compress text-[10px]"></i>
                    </button>
                    <button onclick="downloadChartImage()" class="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white text-[11px] font-bold rounded-xl transition active:scale-95 shadow-md flex items-center gap-1.5" title="Unduh Gambar Grafik (PNG)">
                        <i class="fa-solid fa-image text-[11px]"></i> <span class="hidden sm:inline">PNG</span>
                    </button>
                    <button onclick="downloadDataCSV()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-bold rounded-xl transition active:scale-95 shadow-md flex items-center gap-1.5" title="Unduh Data Excel (CSV)">
                        <i class="fa-solid fa-file-csv text-[11px]"></i> <span class="hidden sm:inline">CSV</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 sm:p-6 space-y-6">
            <div class="flex flex-wrap items-center justify-between gap-2 border-b border-slate-100 pb-3">
                <span class="text-xs font-bold text-slate-900 flex items-center gap-2">
                    <i class="fa-solid fa-chart-line text-blue-500"></i> Analytics Sensor <span class="text-[10px] text-slate-400 font-normal hidden sm:inline">Geser untuk membaca data</span>
                </span>
                <div class="flex gap-3 text-[10px] sm:text-[11px] font-bold">
                    <div class="flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-emerald-500 inline-block"></span> pH </div>
                    <div class="flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-amber-500 inline-block"></span> Turbidity </div>
                    <div class="flex items-center gap-1.5"><span class="h-2 w-2 rounded-full bg-blue-500 inline-block"></span> Water Level </div>
                </div>
            </div>
            
            <div class="w-full">
                <div class="relative h-64 sm:h-80 md:h-96 w-full bg-white rounded-xl" id="canvas-container">
                    <canvas id="chart-multi-parameter"></canvas>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-4 text-center text-[10px] sm:text-[11px] text-slate-400 font-medium mt-auto">
        &copy; 2026 WQ-SYSTEM Project by ZudiJago. All Right Reserved.
    </footer>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const hamburgerIcon = document.getElementById('hamburger-icon');
        hamburgerBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            hamburgerIcon.className = mobileMenu.classList.contains('hidden') ? "fa-solid fa-bars text-xl" : "fa-solid fa-xmark text-xl";
        });
        function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        
        const app = initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        const db = getDatabase(app);

        let currentTimeframe = '15p'; 
        let rawTimestamps = []; 
        let tanggalAktifPilihan = dapatkanTanggalLokal(new Date());
        let unsubscribeLiveStream = null;

        const ctx = document.getElementById('chart-multi-parameter').getContext('2d');
        const chartMulti = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'pH', data: [], borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.2, pointRadius: 2, borderWidth: 2 },
                    { label: 'Turbidity', data: [], borderColor: '#f59e0b', backgroundColor: '#f59e0b', tension: 0.2, pointRadius: 2, borderWidth: 2 },
                    { label: 'Water Level', data: [], borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.2, pointRadius: 2, borderWidth: 2 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { display: false },
                    zoom: {
                        pan: { enabled: true, mode: 'x' },
                        zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
                    }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { font: { size: 9 }, color: '#94a3b8' }, min: undefined, max: undefined },
                    y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 }, color: '#64748b' } }
                }
            }
        });

        window.resetSkalaGrafik = function() { 
            document.getElementById('filter-jam-mulai').value = "";
            document.getElementById('filter-jam-selesai').value = "";
            chartMulti.resetZoom(); 
        };

        window.ubahTimeframe = function(tf) {
            currentTimeframe = tf;
            document.getElementById('filter-jam-mulai').value = "";
            document.getElementById('filter-jam-selesai').value = "";

            const tfs = ['15p', '1h', '6h', 'all'];
            tfs.forEach(item => {
                const btn = document.getElementById(`tf-${item}`);
                if (item === tf) {
                    btn.className = "px-3 py-1 rounded-lg text-[11px] font-bold transition-all duration-200 bg-white text-slate-900 shadow-sm border border-slate-200/50";
                } else {
                    btn.className = "px-3 py-1 rounded-lg text-[11px] font-bold transition-all duration-200 text-slate-600 hover:text-slate-900";
                }
            });

            chartMulti.resetZoom(); 
            aturBatasTampilanGrafik();
            chartMulti.update();
        };

        window.terapkanFilterJam = function() {
            const jamMulai = document.getElementById('filter-jam-mulai').value;
            const jamSelesai = document.getElementById('filter-jam-selesai').value;

            if (!jamMulai || !jamSelesai) {
                alert("Silakan isi Jam Mulai dan Jam Selesai terlebih dahulu!");
                return;
            }

            currentTimeframe = 'custom';
            
            const tfs = ['15p', '1h', '6h', 'all'];
            tfs.forEach(item => {
                document.getElementById(`tf-${item}`).className = "px-3 py-1 rounded-lg text-[11px] font-bold transition-all duration-200 text-slate-600 hover:text-slate-900";
            });

            const labels = chartMulti.data.labels;
            if (labels.length === 0) return;

            let minLabel = undefined;
            let maxLabel = undefined;

            for (let i = 0; i < labels.length; i++) {
                if (labels[i] >= jamMulai) {
                    minLabel = labels[i];
                    break;
                }
            }

            const maxCompareStr = jamSelesai + ".99";
            for (let i = labels.length - 1; i >= 0; i--) {
                if (labels[i] <= maxCompareStr) {
                    maxLabel = labels[i];
                    break;
                }
            }

            chartMulti.options.scales.x.min = minLabel;
            chartMulti.options.scales.x.max = maxLabel;
            chartMulti.update();
        };

        function aturBatasTampilanGrafik() {
            if (currentTimeframe === 'custom') return;

            const totalData = chartMulti.data.labels.length;
            if (totalData === 0) return;

            if (currentTimeframe === '15p') {
                const jumlahTampil = 15;
                if (totalData > jumlahTampil) {
                    chartMulti.options.scales.x.min = chartMulti.data.labels[totalData - jumlahTampil];
                    chartMulti.options.scales.x.max = chartMulti.data.labels[totalData - 1];
                } else {
                    chartMulti.options.scales.x.min = undefined;
                    chartMulti.options.scales.x.max = undefined;
                }
            } 
            else if (currentTimeframe === '1h' || currentTimeframe === '6h') {
                const detikTerakhir = rawTimestamps[totalData - 1];
                const durasiMundur = currentTimeframe === '1h' ? 3600 : 21600; 
                const batasDetikMin = detikTerakhir - durasiMundur;
                
                let indeksTarget = 0;
                for (let i = totalData - 1; i >= 0; i--) {
                    if (rawTimestamps[i] < batasDetikMin) {
                        indeksTarget = i + 1;
                        break;
                    }
                }
                
                if (indeksTarget < totalData) {
                    chartMulti.options.scales.x.min = chartMulti.data.labels[indeksTarget];
                    chartMulti.options.scales.x.max = chartMulti.data.labels[totalData - 1];
                } else {
                    chartMulti.options.scales.x.min = undefined;
                    chartMulti.options.scales.x.max = undefined;
                }
            } 
            else if (currentTimeframe === 'all') {
                chartMulti.options.scales.x.min = undefined;
                chartMulti.options.scales.x.max = undefined;
            }
        }

        function formatWaktu(d) {
            const h = String(d.getHours()).padStart(2, '0');
            const m = String(d.getMinutes()).padStart(2, '0');
            const s = String(d.getSeconds()).padStart(2, '0');
            return `${h}:${m}.${s}`;
        }

        function dapatkanTanggalLokal(objDate) {
            const y = objDate.getFullYear();
            const m = String(objDate.getMonth() + 1).padStart(2, '0');
            const d = String(objDate.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        window.muatGrafikPerTanggal = function(tanggalFolder) {
            chartMulti.data.labels = [];
            chartMulti.data.datasets[0].data = [];
            chartMulti.data.datasets[1].data = [];
            chartMulti.data.datasets[2].data = [];
            rawTimestamps = [];
            chartMulti.update();

            const logRef = query(ref(db, 'SistemAir_Log/' + tanggalFolder), limitToLast(2880));
            
            get(logRef).then((snapshot) => {
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const dataLog = childSnapshot.val();
                        let ts = dataLog.timestamp ? Number(dataLog.timestamp) : Date.now() / 1000;
                        let waktuLabel = formatWaktu(new Date(ts * 1000));
                        
                        rawTimestamps.push(ts);
                        chartMulti.data.labels.push(waktuLabel);
                        chartMulti.data.datasets[0].data.push(dataLog.pH || 0);
                        chartMulti.data.datasets[1].data.push(dataLog.turbidity || 0);
                        chartMulti.data.datasets[2].data.push(dataLog.tinggiAir || 0);
                    });
                }
                aturBatasTampilanGrafik();
                chartMulti.update();
                aktifkanAtauMatikanLiveStream(tanggalFolder);
            });
        };

        function aktifkanAtauMatikanLiveStream(tanggalFolder) {
            if (unsubscribeLiveStream) {
                unsubscribeLiveStream();
                unsubscribeLiveStream = null;
            }

            const hariIniLokal = dapatkanTanggalLokal(new Date());
            
            if (tanggalFolder === hariIniLokal) {
                unsubscribeLiveStream = onValue(ref(db, 'SistemAir'), (snapshot) => {
                    if (snapshot.exists()) {
                        const d = snapshot.val();
                        let ts = d.timestamp ? Number(d.timestamp) : Date.now() / 1000;
                        const waktu = formatWaktu(new Date(ts * 1000));

                        rawTimestamps.push(ts);
                        chartMulti.data.labels.push(waktu);
                        chartMulti.data.datasets[0].data.push(d.pH || 0);
                        chartMulti.data.datasets[1].data.push(d.turbidity || 0);
                        chartMulti.data.datasets[2].data.push(d.tinggiAir || 0);

                        if (chartMulti.data.labels.length > 2880) {
                            rawTimestamps.shift();
                            chartMulti.data.labels.shift();
                            chartMulti.data.datasets[0].data.shift();
                            chartMulti.data.datasets[1].data.shift();
                            chartMulti.data.datasets[2].data.shift();
                        }
                        aturBatasTampilanGrafik();
                        chartMulti.update();
                    }
                });
            }
        }

        window.gantiTanggalGrafik = function() {
            const tglDipilih = document.getElementById("filter-tanggal-grafik").value;
            if (tglDipilih) {
                tanggalAktifPilihan = tglDipilih;
                window.muatGrafikPerTanggal(tglDipilih);
            }
        };

        // --- FUNGSI UNDUH GAMBAR GRAFIK (PNG) ---
        window.downloadChartImage = function() {
            const canvas = document.getElementById('chart-multi-parameter');
            const tglPilihan = document.getElementById("filter-tanggal-grafik").value || "Riwayat";
            
            // Buat canvas sementara dengan background putih agar tidak transparan/hitam di galeri
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const ctxTemp = tempCanvas.getContext('2d');
            
            ctxTemp.fillStyle = '#ffffff';
            ctxTemp.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            ctxTemp.drawImage(canvas, 0, 0);

            const url = tempCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = url;
            link.download = `WQ_Grafik_${tglPilihan}.png`;
            link.click();
        };

        // --- FUNGSI UNDUH DATA (CSV) ---
        window.downloadDataCSV = async function() {
            const tglPilihan = document.getElementById("filter-tanggal-grafik").value;
            if (!tglPilihan) {
                alert("Silakan pilih tanggal pada kalender terlebih dahulu!");
                return;
            }

            try {
                const logRefNode = query(ref(db, 'SistemAir_Log/' + tglPilihan));
                const snap = await get(logRefNode);
                
                if (snap.exists()) {
                    let csvText = "Waktu_Data_Masuk,pH_Level,Kekeruhan_NTU,Tinggi_Air_CM\n";
                    let rowCount = 0;

                    snap.forEach(child => {
                        const d = child.val();
                        let ts = d.timestamp ? Number(d.timestamp) : Date.now() / 1000;
                        let waktuJam = formatWaktu(new Date(ts * 1000));
                        
                        csvText += `${waktuJam},${d.pH || 0},${d.turbidity || 0},${d.tinggiAir || 0}\n`;
                        rowCount++;
                    });

                    if (rowCount > 0) {
                        const blob = new Blob([csvText], { type: 'text/csv' });
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `WQ_Data_${tglPilihan}.csv`;
                        link.click();
                    } else {
                        alert(`Tidak ditemukan data untuk tanggal ${tglPilihan}.`);
                    }
                } else {
                    alert(`Database untuk tanggal ${tglPilihan} kosong.`);
                }
            } catch (err) {
                console.error("Gagal Download CSV:", err);
                alert("Terjadi kesalahan jaringan saat mengunduh CSV.");
            }
        };

        const inputKalender = document.getElementById("filter-tanggal-grafik");
        inputKalender.value = tanggalAktifPilihan;
        window.muatGrafikPerTanggal(tanggalAktifPilihan);

        let hariIniTerakhir = dapatkanTanggalLokal(new Date());
        
        setInterval(() => {
            const hariIniLokal = dapatkanTanggalLokal(new Date());
            if (hariIniLokal !== hariIniTerakhir) {
                if (tanggalAktifPilihan === hariIniTerakhir) {
                    tanggalAktifPilihan = hariIniLokal;
                    inputKalender.value = hariIniLokal;
                    window.muatGrafikPerTanggal(hariIniLokal);
                }
                hariIniTerakhir = hariIniLokal;
            }
        }, 5000); 
    </script>
</body>
</html>
