<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Analisis</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=final">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-leaf" style="color: #2563eb;"></i> WATER QUALITY MONITORING</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="speedometer.html">Speedometer</a>
            <a href="grafik.html" class="active">Grafik</a>
            <a href="history.html">History</a>
            <a href="#" class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header"><div class="page-title"><h1><i class="fa-solid fa-chart-line"></i> Grafik Tren Data</h1></div></div>

        <div class="grid-grafik">
            <div class="chart-container"><div class="section-title" style="margin-top:0"><i class="fa-solid fa-flask" style="color:#10b981"></i> Tren pH</div><div class="chart-wrapper"><canvas id="c-ph"></canvas></div></div>
            <div class="chart-container"><div class="section-title" style="margin-top:0"><i class="fa-solid fa-bolt" style="color:#f59e0b"></i> Tren Kekeruhan</div><div class="chart-wrapper"><canvas id="c-tb"></canvas></div></div>
            <div class="chart-container"><div class="section-title" style="margin-top:0"><i class="fa-solid fa-water" style="color:#3b82f6"></i> Tren Tinggi Air</div><div class="chart-wrapper"><canvas id="c-lv"></canvas></div></div>
        </div>
    </div>

    <script>function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }</script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        
        function buatChart(id, label, colorSolid, colorBg) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: colorSolid, backgroundColor: colorBg, fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        const chPh = buatChart('c-ph', 'pH', '#10b981', 'rgba(16, 185, 129, 0.1)');
        const chTb = buatChart('c-tb', 'NTU', '#f59e0b', 'rgba(245, 158, 11, 0.1)');
        const chLv = buatChart('c-lv', 'cm', '#3b82f6', 'rgba(59, 130, 246, 0.1)');

        onValue(ref(getDatabase(), 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const d = snapshot.val();
                const w = new Date().toLocaleTimeString('id-ID', {hour12: false});
                
                [ [chPh, d.pH], [chTb, d.turbidity], [chLv, d.tinggiAir] ].forEach(([c, val]) => {
                    c.data.labels.push(w); c.data.datasets[0].data.push(val || 0);
                    if(c.data.labels.length > 15) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
                    c.update();
                });
            }
        });
    </script>
</body>
</html>
