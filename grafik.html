<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - WQ System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <nav class="bg-slate-900 text-white sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-2.5">
                    <div class="bg-blue-600/10 p-2 rounded-lg text-blue-400 border border-blue-500/20">
                        <i class="fa-solid fa-droplet text-base"></i>
                    </div>
                    <span class="text-md font-extrabold tracking-wider text-white">WQ-SYSTEM</span>
                </div>
                <div class="flex space-x-1 bg-slate-800/50 p-1 rounded-xl border border-slate-700/30">
                    <a href="index.html" class="text-slate-400 hover:text-white px-3.5 py-1.5 rounded-lg text-xs font-semibold transition">Overview</a>
                    <a href="speedometer.html" class="text-slate-400 hover:text-white px-3.5 py-1.5 rounded-lg text-xs font-semibold transition">Gauges</a>
                    <a href="grafik.html" class="bg-blue-600 text-white px-3.5 py-1.5 rounded-lg text-xs font-semibold shadow-sm transition">Analytics</a>
                    <a href="history.html" class="text-slate-400 hover:text-white px-3.5 py-1.5 rounded-lg text-xs font-semibold transition">Data Log</a>
                </div>
                <div>
                    <button onclick="logout()" class="h-9 w-9 bg-slate-800 hover:bg-rose-900/40 border border-slate-700/50 hover:border-rose-500/30 text-slate-400 hover:text-rose-400 rounded-xl flex items-center justify-center transition active:scale-95" title="Keluar">
                        <i class="fa-solid fa-power-off text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">
        <div class="border-b border-slate-200 pb-5">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Data Analytics</h1>
            <p class="text-xs text-slate-500 mt-1">Pemantauan fluktuasi parameter historis (Real-time Area Chart).</p>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> pH Metrics</span>
                <div class="h-64"><canvas id="c-ph"></canvas></div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> Turbidity Metrics</span>
                <div class="h-64"><canvas id="c-tb"></canvas></div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 space-y-3">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Level Metrics</span>
                <div class="h-64"><canvas id="c-lv"></canvas></div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-4 text-center text-[11px] text-slate-400 font-medium">
        &copy; 2026 WQ-SYSTEM Project by ZudiJago. All Right Reserved.
    </footer>

    <script>function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }</script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Inter';
        Chart.defaults.font.size = 10;

        function buatChart(id, label, colorSolid, gradStart) {
            const ctx = document.getElementById(id).getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 240);
            gradient.addColorStop(0, gradStart);
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: colorSolid, backgroundColor: gradient, fill: true, tension: 0.35, borderWidth: 2, pointRadius: 0, pointHoverRadius: 4 }] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        x: { grid: { display: false }, ticks: { maxTicksLimit: 8 } }, 
                        y: { grid: { color: '#f1f5f9' }, border: { dash: [4, 4] } } 
                    }, 
                    plugins: { legend: { display: false } } 
                }
            });
        }

        const chPh = buatChart('c-ph', 'pH', '#10b981', 'rgba(16, 185, 129, 0.12)');
        const chTb = buatChart('c-tb', 'NTU', '#f59e0b', 'rgba(245, 158, 11, 0.12)');
        const chLv = buatChart('c-lv', 'cm', '#3b82f6', 'rgba(59, 130, 246, 0.12)');

        onValue(ref(getDatabase(), 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const d = snapshot.val();
                const w = new Date().toLocaleTimeString('id-ID', {hour12: false});
                
                [ [chPh, d.pH], [chTb, d.turbidity], [chLv, d.tinggiAir] ].forEach(([c, val]) => {
                    c.data.labels.push(w); c.data.datasets[0].data.push(val || 0);
                    if(c.data.labels.length > 20) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
                    c.update();
                });
            }
        });
    </script>
</body>
</html>
