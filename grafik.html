<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Analisis - Monitoring Air</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-leaf" style="color: #2563eb;"></i> WATER QUALITY MONITORING</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="speedometer.html">Speedometer</a>
            <a href="grafik.html" class="active">Grafik</a>
            <a href="history.html">History</a>
            <a href="#" class="btn-login"><i class="fa-solid fa-lock"></i> Login Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="page-title">
                <h1><i class="fa-solid fa-chart-line"></i> Grafik Analisis Data</h1>
                <p>Tren perubahan parameter sensor air secara real-time</p>
            </div>
        </div>

        <div class="chart-container"><div class="section-title"><i class="fa-solid fa-flask" style="color:#10b981"></i> Grafik Perkembangan pH</div><div class="chart-wrapper"><canvas id="chart-ph"></canvas></div></div>
        <div class="chart-container"><div class="section-title"><i class="fa-solid fa-bolt" style="color:#f59e0b"></i> Grafik Tingkat Kekeruhan (NTU)</div><div class="chart-wrapper"><canvas id="chart-turbidity"></canvas></div></div>
        <div class="chart-container"><div class="section-title"><i class="fa-solid fa-water" style="color:#3b82f6"></i> Grafik Ketinggian Air (cm)</div><div class="chart-wrapper"><canvas id="chart-level"></canvas></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A",
            databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        initializeApp(firebaseConfig);
        const db = getDatabase();

        function buatLineChart(id, label, color) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: color, backgroundColor: color+'20', fill: true, tension: 0.3 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } } } }
            });
        }

        const cPh = buatLineChart('chart-ph', 'pH Air', '#10b981');
        const cTb = buatLineChart('chart-turbidity', 'Kekeruhan (NTU)', '#f59e0b');
        const cLv = buatLineChart('chart-level', 'Tinggi Air (cm)', '#3b82f6');

        onValue(ref(db, 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                const waktu = new Date().toLocaleTimeString('id-ID', { hour12: false });

                [ [cPh, data.pH], [cTb, data.turbidity], [cLv, data.tinggiAir] ].forEach(([chart, val]) => {
                    chart.data.labels.push(waktu);
                    chart.data.datasets[0].data.push(val || 0);
                    if(chart.data.labels.length > 12) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                    chart.update();
                });
            }
        });
    </script>
</body>
</html>
