<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - WQ System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> .grid-grafik { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; } </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-droplet" style="color: #3b82f6;"></i> WQ-SYSTEM</div>
        <div class="nav-links">
            <a href="index.html">Overview</a>
            <a href="speedometer.html">Gauges</a>
            <a href="grafik.html" class="active">Analytics</a>
            <a href="history.html">Data Log</a>
            <a href="#" class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header"><div class="page-title"><h1>Data Analytics</h1><p>Pemantauan fluktuasi parameter historis (Line Chart)</p></div></div>

        <div class="grid-grafik">
            <div class="chart-container"><div class="section-title"><i class="fa-solid fa-chart-area" style="color:#10b981"></i> pH Metrics</div><div class="chart-wrapper"><canvas id="c-ph"></canvas></div></div>
            <div class="chart-container"><div class="section-title"><i class="fa-solid fa-chart-area" style="color:#f59e0b"></i> Turbidity Metrics</div><div class="chart-wrapper"><canvas id="c-tb"></canvas></div></div>
            <div class="chart-container"><div class="section-title"><i class="fa-solid fa-chart-area" style="color:#3b82f6"></i> Level Metrics</div><div class="chart-wrapper"><canvas id="c-lv"></canvas></div></div>
        </div>
    </div>

    <script>function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }</script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        
        Chart.defaults.color = '#64748b';
        Chart.defaults.font.family = 'Nunito';

        function buatChart(id, label, colorSolid, colorBg) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ label: label, data: [], borderColor: colorSolid, backgroundColor: colorBg, fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0, pointHoverRadius: 5 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, y: { grid: { color: '#e2e8f0', drawBorder: false } } }, plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } } }
            });
        }

        const chPh = buatChart('c-ph', 'pH', '#10b981', 'rgba(16, 185, 129, 0.05)');
        const chTb = buatChart('c-tb', 'NTU', '#f59e0b', 'rgba(245, 158, 11, 0.05)');
        const chLv = buatChart('c-lv', 'cm', '#3b82f6', 'rgba(59, 130, 246, 0.05)');

        onValue(ref(getDatabase(), 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const d = snapshot.val();
                const w = new Date().toLocaleTimeString('id-ID', {hour12: false});
                
                [ [chPh, d.pH], [chTb, d.turbidity], [chLv, d.tinggiAir] ].forEach(([c, val]) => {
                    c.data.labels.push(w); c.data.datasets[0].data.push(val || 0);
                    if(c.data.labels.length > 20) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
                    c.update();
                });
            }
        });
    </script>
</body>
</html>
