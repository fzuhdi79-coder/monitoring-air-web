<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik Analisis</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Grafik Analisis Data</h1>
            <p>Riwayat Perubahan Sensor Air</p>
        </header>

        <div class="nav-tabs">
            <a href="index.html" class="tab-link"><i class="fa-solid fa-gauge"></i> Speedometer</a>
            <a href="grafik.html" class="tab-link active"><i class="fa-solid fa-chart-line"></i> Grafik Riwayat</a>
            <a href="kontrol.html" class="tab-link"><i class="fa-solid fa-sliders"></i> Kontrol Pompa</a>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-flask" style="color: var(--color-ph);"></i> Grafik pH Air</h3>
            <div class="chart-wrapper"><canvas id="chart-ph"></canvas></div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-water" style="color: var(--color-turbidity);"></i> Grafik Kekeruhan (NTU)</h3>
            <div class="chart-wrapper"><canvas id="chart-turbidity"></canvas></div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-ruler-vertical" style="color: var(--color-water);"></i> Grafik Ketinggian Air (cm)</h3>
            <div class="chart-wrapper"><canvas id="chart-level"></canvas></div>
        </div>

        <div id="status-bar"><span id="text-status">Menghubungkan ke Firebase...</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let timeLabels = [], dataPH = [], dataTurbidity = [], dataLevel = [];
        const commonOptions = { responsive: true, maintainAspectRatio: false, animation: false };

        const chartPH = new Chart(document.getElementById('chart-ph').getContext('2d'), {
            type: 'line',
            data: { labels: timeLabels, datasets: [{ label: 'pH', data: dataPH, borderColor: '#10b981', tension: 0.2, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.05)' }] },
            options: commonOptions
        });
        const chartTurbidity = new Chart(document.getElementById('chart-turbidity').getContext('2d'), {
            type: 'line',
            data: { labels: timeLabels, datasets: [{ label: 'NTU', data: dataTurbidity, borderColor: '#f59e0b', tension: 0.2, fill: true, backgroundColor: 'rgba(245, 158, 11, 0.05)' }] },
            options: commonOptions
        });
        const chartLevel = new Chart(document.getElementById('chart-level').getContext('2d'), {
            type: 'line',
            data: { labels: timeLabels, datasets: [{ label: 'Tinggi (cm)', data: dataLevel, borderColor: '#3b82f6', tension: 0.2, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)' }] },
            options: commonOptions
        });

        onValue(ref(db, 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                const now = new Date();
                const timeString = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');

                timeLabels.push(timeString);
                dataPH.push(data.pH || 0);
                dataTurbidity.push(data.turbidity || 0);
                dataLevel.push(data.tinggiAir || 0);

                if(timeLabels.length > 15) {
                    timeLabels.shift(); dataPH.shift(); dataTurbidity.shift(); dataLevel.shift();
                }

                chartPH.update(); chartTurbidity.update(); chartLevel.update();
                document.getElementById('text-status').innerText = "🟢 Grafik Berjalan Real-Time";
            }
        });
    </script>
</body>
</html>
