<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>
        if (sessionStorage.getItem("statusLogin") !== "sukses") {
            window.location.href = "login.html";
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedometer Indikator - Monitoring Air</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.6.1/justgage.min.js"></script>
    
    <style>
        .gauge-container { width: 100%; height: 220px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-leaf" style="color: #2563eb;"></i> WATER QUALITY MONITORING</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="speedometer.html" class="active">Speedometer</a>
            <a href="grafik.html">Grafik</a>
            <a href="history.html">History</a>
            <a href="login.html" class="btn-login"><i class="fa-solid fa-lock"></i> Login Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="page-title">
                <h1><i class="fa-solid fa-gauge-high"></i> Speedometer Indikator</h1>
                <p>Visualisasi metrik sensor menggunakan model pengukur radial (Gauge)</p>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card">
                <div class="card-title">Derajat Keasaman (pH)</div>
                <div id="gauge-ph" class="gauge-container"></div>
            </div>
            <div class="card">
                <div class="card-title">Kekeruhan Air (NTU)</div>
                <div id="gauge-turbidity" class="gauge-container"></div>
            </div>
            <div class="card">
                <div class="card-title">Ketinggian Air (cm)</div>
                <div id="gauge-level" class="gauge-container"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A",
            databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        initializeApp(firebaseConfig);
        const db = getDatabase();

        // Konfigurasi Speedometer
        const gaugePH = new JustGage({ id: "gauge-ph", value: 0, min: 0, max: 14, decimals: 2, label: "pH", levelColors: ["#ef4444", "#10b981", "#ef4444"], pointer: true, pointerOptions: { color: '#202b36' } });
        const gaugeTurbidity = new JustGage({ id: "gauge-turbidity", value: 0, min: 0, max: 3000, label: "NTU", levelColors: ["#10b981", "#f59e0b", "#ef4444"], pointer: true, pointerOptions: { color: '#202b36' } });
        const gaugeLevel = new JustGage({ id: "gauge-level", value: 0, min: 0, max: 100, label: "cm", levelColors: ["#ef4444", "#3b82f6", "#10b981"], pointer: true, pointerOptions: { color: '#202b36' } });

        // Update Real-time
        onValue(ref(db, 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                gaugePH.refresh(data.pH || 0);
                gaugeTurbidity.refresh(data.turbidity || 0);
                gaugeLevel.refresh(data.tinggiAir || 0);
            }
        });
    </script>
</body>
</html>
