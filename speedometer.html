<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedometer Indikator - Monitoring Air</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-leaf" style="color: #2563eb;"></i> WATER QUALITY MONITORING</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="speedometer.html" class="active">Speedometer</a>
            <a href="grafik.html">Grafik</a>
            <a href="history.html">History</a>
            <a href="#" class="btn-login"><i class="fa-solid fa-lock"></i> Login Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="page-title">
                <h1><i class="fa-solid fa-gauge-high"></i> Speedometer Indikator</h1>
                <p>Visualisasi metrik sensor menggunakan model pengukur radial</p>
            </div>
        </div>

        <div class="grid-layout">
            <div class="card"><div class="card-title">Gauge Derajat Keasaman (pH)</div><div class="chart-wrapper"><canvas id="gauge-ph"></canvas></div><div class="card-value" id="txt-ph" style="margin-top: -30px;">0</div></div>
            <div class="card"><div class="card-title">Gauge Kekeruhan (NTU)</div><div class="chart-wrapper"><canvas id="gauge-turbidity"></canvas></div><div class="card-value" id="txt-turbidity" style="margin-top: -30px;">0</div></div>
            <div class="card"><div class="card-title">Gauge Ketinggian Air (cm)</div><div class="chart-wrapper"><canvas id="gauge-level"></canvas></div><div class="card-value" id="txt-level" style="margin-top: -30px;">0</div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A",
            databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        initializeApp(firebaseConfig);
        const db = getDatabase();

        function buatGauge(id, maxVal, color) {
            return new Chart(document.getElementById(id), {
                type: 'doughnut',
                data: {
                    datasets: [{ data: [0, maxVal], backgroundColor: [color, '#e2e8f0'], borderWidth: 0 }]
                },
                options: {
                    rotation: -90, circumference: 180, cutout: '75%',
                    plugins: { tooltip: { enabled: false } }
                }
            });
        }

        const chartPh = buatGauge('gauge-ph', 14, '#10b981');
        const chartTb = buatGauge('gauge-turbidity', 3000, '#f59e0b');
        const chartLv = buatGauge('gauge-level', 100, '#3b82f6');

        onValue(ref(db, 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                let p = data.pH || 0, t = data.turbidity || 0, l = data.tinggiAir || 0;
                
                document.getElementById('txt-ph').innerText = p;
                chartPh.data.datasets[0].data = [p, 14 - p]; chartPh.update();

                document.getElementById('txt-turbidity').innerText = t + " NTU";
                chartTb.data.datasets[0].data = [t, Math.max(0, 3000 - t)]; chartTb.update();

                document.getElementById('txt-level').innerText = l + " cm";
                chartLv.data.datasets[0].data = [l, Math.max(0, 100 - l)]; chartLv.update();
            }
        });
    </script>
</body>
</html>
