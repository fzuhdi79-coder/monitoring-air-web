<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauges - WQ System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.6.1/justgage.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-droplet" style="color: #3b82f6;"></i> WQ-SYSTEM</div>
        <div class="nav-links">
            <a href="index.html">Overview</a>
            <a href="speedometer.html" class="active">Gauges</a>
            <a href="grafik.html">Analytics</a>
            <a href="history.html">Data Log</a>
            <a href="#" class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header"><div class="page-title"><h1>Instrument Gauges</h1><p>Visualisasi radial parameter operasional</p></div></div>

        <div class="grid-layout">
            <div class="card"><div class="card-title">pH Sensor</div><div id="gauge-ph" style="width:100%; height:200px;"></div></div>
            <div class="card"><div class="card-title">Turbidity Sensor</div><div id="gauge-turbidity" style="width:100%; height:200px;"></div></div>
            <div class="card"><div class="card-title">Level Sensor</div><div id="gauge-level" style="width:100%; height:200px;"></div></div>
        </div>
    </div>

    <script>function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }</script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        
        let pColor = "#475569"; // Slate gray untuk jarum
        const gPh = new JustGage({ id: "gauge-ph", value: 0, min: 0, max: 14, label: "pH", levelColors: ["#ef4444","#10b981","#ef4444"], pointer: true, pointerOptions: {color: pColor}, valueFontColor: "#0f172a" });
        const gTb = new JustGage({ id: "gauge-turbidity", value: 0, min: 0, max: 3000, label: "NTU", levelColors: ["#10b981","#f59e0b","#ef4444"], pointer: true, pointerOptions: {color: pColor}, valueFontColor: "#0f172a" });
        const gLv = new JustGage({ id: "gauge-level", value: 0, min: 0, max: 100, label: "cm", levelColors: ["#ef4444","#3b82f6","#10b981"], pointer: true, pointerOptions: {color: pColor}, valueFontColor: "#0f172a" });

        onValue(ref(getDatabase(), 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                let d = snapshot.val();
                gPh.refresh(d.pH || 0); gTb.refresh(d.turbidity || 0); gLv.refresh(d.tinggiAir || 0);
            }
        });
    </script>
</body>
</html>
