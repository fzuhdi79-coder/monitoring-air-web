<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Log Sensor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=final">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-leaf" style="color: #2563eb;"></i> WATER QUALITY MONITORING</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="speedometer.html">Speedometer</a>
            <a href="grafik.html">Grafik</a>
            <a href="history.html" class="active">History</a>
            <a href="#" class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="table-container">
            <div class="header-action">
                <div class="section-title" style="margin:0"><i class="fa-solid fa-database"></i> Database Tabel</div>
                <button class="btn-export" onclick="exportCSV()"><i class="fa-solid fa-file-csv"></i> Download CSV</button>
            </div>
            <table class="data-table">
                <thead><tr><th>Jam</th><th>Tanggal</th><th>pH</th><th>Turbidity</th><th>Water Level</th></tr></thead>
                <tbody id="badan-tabel"></tbody>
            </table>
        </div>
    </div>

    <script>
        function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }
        function exportCSV() {
            let csv = []; let rows = document.querySelectorAll("table tr");
            for(let i=0; i<rows.length; i++) {
                let cols = rows[i].querySelectorAll("td, th"), row = [];
                for(let j=0; j<cols.length; j++) row.push(cols[j].innerText.replace(/ NTU| cm/g, ""));
                csv.push(row.join(","));
            }
            let a = document.createElement("a");
            a.href = window.URL.createObjectURL(new Blob([csv.join("\n")], {type: "text/csv"}));
            a.download = "Laporan_Air.csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        
        let tb = document.getElementById('badan-tabel'), cnt = 0;
        onValue(ref(getDatabase(), 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                let d = snapshot.val(), now = new Date();
                let time = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
                let date = String(now.getDate()).padStart(2,'0')+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+now.getFullYear();

                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${time}</td><td>${date}</td><td style="color:${d.pH<6.5||d.pH>8.5?'#ef4444':'#10b981'}">${d.pH||0}</td><td>${d.turbidity||0} NTU</td><td>${d.tinggiAir||0} cm</td>`;
                tb.insertBefore(tr, tb.firstChild); cnt++;
                if(cnt > 50) tb.removeChild(tb.lastChild);
            }
        });
    </script>
</body>
</html>
