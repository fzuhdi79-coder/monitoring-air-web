<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<script>if(sessionStorage.getItem("statusLogin")!=="sukses"){window.location.href="login.html";}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Log — WQ System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
:root{
  --bg:#f6f6f5;--surface:#ffffff;--surface-2:#fafaf9;
  --border:#e5e5e2;--border-2:#efefed;
  --text-1:#111110;--text-2:#737370;--text-3:#b0b0ac;
  --mono:'DM Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
  --r-s:6px;--r-m:10px;--r-l:14px;
  --shadow:0 1px 4px rgba(0,0,0,.06);
  --green:#15803d;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#b91c1c;--red-bg:#fff5f5;--red-bd:#fecaca;
}
[data-theme="dark"]{
  --bg:#111110;--surface:#1a1a18;--surface-2:#202020;
  --border:#2c2c2a;--border-2:#242422;
  --text-1:#f0f0ee;--text-2:#9a9a96;--text-3:#585854;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text-1);display:flex;flex-direction:column;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
[data-theme="dark"] nav{background:rgba(26,26,24,.88);}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;}
.brand-mark{width:28px;height:28px;border-radius:7px;background:var(--text-1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-mark svg{width:13px;height:13px;}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-.02em;color:var(--text-1);}
.nav-tabs{display:flex;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-m);padding:3px;}
.nav-tab{padding:5px 14px;border-radius:7px;font-size:13px;font-weight:500;text-decoration:none;color:var(--text-2);transition:color .14s,background .14s;}
.nav-tab:hover{color:var(--text-1);background:var(--border-2);}
.nav-tab.on{background:var(--surface);color:var(--text-1);box-shadow:var(--shadow);}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-clock{font-family:var(--mono);font-size:12px;color:var(--text-3);}
.icon-btn{width:32px;height:32px;border-radius:var(--r-s);border:1px solid var(--border);background:none;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;}
.icon-btn:hover{background:var(--surface-2);color:var(--text-1);}
.ghost-btn{height:32px;padding:0 12px;border-radius:var(--r-s);border:1px solid var(--border);background:none;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .14s;}
.ghost-btn:hover{background:var(--surface-2);color:var(--text-1);}
.hbtn{display:none;width:32px;height:32px;border-radius:var(--r-s);border:1px solid var(--border);background:none;color:var(--text-2);cursor:pointer;align-items:center;justify-content:center;}
.mob-menu{display:none;flex-direction:column;gap:3px;padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--surface);}
.mob-menu.open{display:flex;}
.mob-link{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--r-s);font-size:13px;font-weight:500;color:var(--text-2);text-decoration:none;transition:all .14s;}
.mob-link:hover,.mob-link.on{background:var(--bg);color:var(--text-1);}
.mob-divider{height:1px;background:var(--border);margin:4px 0;}

/* PAGE */
.page{max-width:1280px;margin:0 auto;padding:28px 24px 56px;display:flex;flex-direction:column;gap:20px;}

/* PAGE HEADER */
.pg-header{padding-bottom:20px;border-bottom:1px solid var(--border);}
.pg-title{font-size:16px;font-weight:600;letter-spacing:-.022em;}
.pg-sub{font-size:13px;color:var(--text-3);margin-top:3px;}

/* TABLE CARD */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-l);overflow:hidden;}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.toolbar-left{display:flex;align-items:center;gap:10px;}
.toolbar-title{font-size:13px;font-weight:600;letter-spacing:-.01em;color:var(--text-1);}
.count-badge{font-family:var(--mono);font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-m);overflow:hidden;height:32px;}
.filter-seg{display:flex;align-items:center;gap:6px;padding:0 10px;height:100%;}
.filter-seg+.filter-seg{border-left:1px solid var(--border);}
.filter-seg input[type="date"],
.filter-seg input[type="time"]{background:none;border:none;outline:none;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text-1);cursor:pointer;}
.filter-seg input::-webkit-calendar-picker-indicator{opacity:.35;cursor:pointer;}
.filter-divider{font-family:var(--mono);font-size:11px;color:var(--text-3);}
.filter-reset{background:none;border:none;cursor:pointer;color:var(--text-3);display:flex;align-items:center;padding:0 8px;height:100%;transition:color .14s;}
.filter-reset:hover{color:var(--red);}

/* ACTION BTNS */
.act-btn{height:32px;padding:0 12px;border-radius:var(--r-s);border:1px solid var(--border);background:var(--surface);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .14s;white-space:nowrap;}
.act-btn:hover{background:var(--surface-2);color:var(--text-1);}
.act-btn.danger{color:var(--red);border-color:var(--red-bd);}
.act-btn.danger:hover{background:var(--red-bg);}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
thead th{padding:10px 14px;font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;text-align:left;}
thead th.center{text-align:center;}
tbody tr{border-bottom:1px solid var(--border-2);transition:background .1s;}
tbody tr:hover{background:var(--surface-2);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:11px 14px;font-size:13px;color:var(--text-2);white-space:nowrap;}
.td-mono{font-family:var(--mono);font-size:12px;color:var(--text-3);}
.td-val{font-weight:600;color:var(--text-1);}
.td-unit{font-size:12px;font-weight:400;color:var(--text-3);margin-left:2px;}
.td-center{text-align:center;}
.row-badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid;margin-left:8px;vertical-align:middle;}
.del-btn{width:28px;height:28px;border-radius:var(--r-s);border:1px solid var(--border);background:none;color:var(--text-3);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .14s;font-size:11px;}
.del-btn:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red);}

/* EMPTY STATE */
.empty-state{padding:52px 20px;text-align:center;}
.empty-icon{font-size:24px;color:var(--text-3);margin-bottom:10px;}
.empty-title{font-size:14px;font-weight:500;color:var(--text-2);margin-bottom:4px;}
.empty-sub{font-size:13px;color:var(--text-3);}

/* FOOTER */
footer{border-top:1px solid var(--border);background:var(--surface);padding:14px 24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:auto;}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-tabs,.nav-clock,.ghost-btn{display:none!important;}
  .hbtn{display:flex;}
  .page{padding:16px 16px 48px;gap:16px;}
  .table-toolbar{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3C9.8 3 8 5.2 8 8.5C8 11 9.4 13.1 11.5 14.2L11 17H13L12.5 14.2C14.6 13.1 16 11 16 8.5C16 5.2 14.2 3 12 3Z" fill="white"/><rect x="10" y="17" width="4" height="2.5" rx="1" fill="white" opacity=".5"/></svg>
      </div>
      <span class="brand-name">WQ System</span>
    </a>
    <div class="nav-tabs">
      <a href="index.html" class="nav-tab">Overview</a>
      <a href="grafik.html" class="nav-tab">Analytics</a>
      <a href="history.html" class="nav-tab on">Data Log</a>
    </div>
    <div class="nav-right">
      <span class="nav-clock" id="nav-clock">--:--:--</span>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme"><i class="fa-regular fa-moon" style="font-size:12px;"></i></button>
      <button class="ghost-btn" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket" style="font-size:11px;"></i>Sign out</button>
      <button class="hbtn" id="hbtn"><i class="fa-solid fa-bars" id="hicon" style="font-size:13px;"></i></button>
    </div>
  </div>
  <div class="mob-menu" id="mob-menu">
    <a href="index.html" class="mob-link"><i class="fa-solid fa-chart-pie" style="font-size:12px;color:var(--text-3);width:16px;"></i>Overview</a>
    <a href="grafik.html" class="mob-link"><i class="fa-solid fa-chart-area" style="font-size:12px;color:var(--text-3);width:16px;"></i>Analytics</a>
    <a href="history.html" class="mob-link on"><i class="fa-solid fa-database" style="font-size:12px;color:var(--text-3);width:16px;"></i>Data Log</a>
    <div class="mob-divider"></div>
    <button onclick="logout()" style="width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-s);font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;">
      <i class="fa-solid fa-arrow-right-from-bracket" style="font-size:11px;"></i>Sign out
    </button>
  </div>
</nav>

<!-- MAIN -->
<main class="page">

  <div class="pg-header">
    <div class="pg-title">Data Log</div>
    <div class="pg-sub">Riwayat parameter harian. Maksimal 2.880 data per hari.</div>
  </div>

  <div class="table-card">
    <!-- Toolbar -->
    <div class="table-toolbar">
      <div class="toolbar-left">
        <span class="toolbar-title">Daily Records</span>
        <span class="count-badge" id="total-data-badge">0 data</span>
      </div>
      <div class="toolbar-right">
        <!-- Filter bar -->
        <div class="filter-bar">
          <div class="filter-seg">
            <i class="fa-regular fa-calendar" style="font-size:10px;color:var(--text-3);"></i>
            <input type="date" id="filter-tanggal" onchange="gantiTanggal()">
          </div>
          <div class="filter-seg">
            <i class="fa-regular fa-clock" style="font-size:10px;color:var(--text-3);"></i>
            <input type="time" id="filter-waktu-mulai" onchange="filterWaktu()">
            <span class="filter-divider">—</span>
            <input type="time" id="filter-waktu-selesai" onchange="filterWaktu()">
            <button class="filter-reset" onclick="resetWaktu()" title="Reset filter jam">
              <i class="fa-solid fa-xmark" style="font-size:11px;"></i>
            </button>
          </div>
        </div>
        <button onclick="unduhCSV()" class="act-btn">
          <i class="fa-solid fa-arrow-down" style="font-size:11px;"></i> Export CSV
        </button>
        <button onclick="hapusSemuaDataLog()" class="act-btn danger">
          <i class="fa-solid fa-trash-can" style="font-size:11px;"></i> Clear All
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="tbl-wrap">
      <table id="tabel-log">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Date</th>
            <th>pH Level</th>
            <th>Turbidity</th>
            <th>Water Level</th>
            <th class="center">Action</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

</main>

<footer>&copy; 2026 WQ-SYSTEM &middot; by ZudiJago</footer>

<script>
/* CLOCK */
function tickClock(){const e=document.getElementById('nav-clock');if(e)e.textContent=new Date().toLocaleTimeString('id-ID',{hour12:false});}
setInterval(tickClock,1000);tickClock();

/* DARK MODE */
let dark=localStorage.getItem('wq-dark')==='1';
function applyTheme(){
  document.documentElement.setAttribute('data-theme',dark?'dark':'');
  const b=document.getElementById('theme-btn');
  if(b)b.innerHTML=dark?'<i class="fa-regular fa-sun" style="font-size:12px;"></i>':'<i class="fa-regular fa-moon" style="font-size:12px;"></i>';
}
function toggleTheme(){dark=!dark;localStorage.setItem('wq-dark',dark?'1':'0');applyTheme();}
applyTheme();

/* HAMBURGER */
document.getElementById('hbtn').addEventListener('click',()=>{
  const m=document.getElementById('mob-menu');
  const ic=document.getElementById('hicon');
  m.classList.toggle('open');
  ic.className=m.classList.contains('open')?'fa-solid fa-xmark':'fa-solid fa-bars';
  ic.style.fontSize='13px';
});

function logout(){sessionStorage.removeItem('statusLogin');window.location.href='login.html';}

/* FILTER WAKTU */
window.filterWaktu=function(){
  const s=document.getElementById('filter-waktu-mulai').value;
  const e=document.getElementById('filter-waktu-selesai').value;
  const rows=document.querySelectorAll('#table-body tr:not(#row-empty-filter)');
  let show=0,total=rows.length;
  rows.forEach(tr=>{
    const t=tr.getAttribute('data-time');
    if(!t){tr.style.display='';show++;return;}
    let vis=true;
    if(s||e){
      const from=s?s+':00':'00:00:00';
      const to=e?e+':59':'23:59:59';
      vis=t>=from&&t<=to;
    }
    tr.style.display=vis?'':'none';
    if(vis)show++;
  });
  const badge=document.getElementById('total-data-badge');
  if(badge)badge.textContent=(s||e)?`${show} / ${total} data`:`${total} data`;
  const old=document.getElementById('row-empty-filter');
  if(old)old.remove();
  if(total>0&&show===0){
    const tr=document.createElement('tr');tr.id='row-empty-filter';
    tr.innerHTML=`<td colspan="6"><div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-magnifying-glass"></i></div><div class="empty-title">Tidak ada data</div><div class="empty-sub">Tidak ada rekaman yang cocok dengan rentang jam ini.</div></div></td>`;
    document.getElementById('table-body').appendChild(tr);
  }
};

window.resetWaktu=function(){
  document.getElementById('filter-waktu-mulai').value='';
  document.getElementById('filter-waktu-selesai').value='';
  window.filterWaktu();
};

/* EXPORT CSV */
function unduhCSV(){
  const rows=document.querySelectorAll('#table-body tr[data-date]');
  let csv='Timestamp,Date,pH,Turbidity_NTU,WaterLevel_cm\n';let n=0;
  rows.forEach(tr=>{
    if(tr.style.display==='none')return;
    const cells=tr.querySelectorAll('td');
    if(cells.length<5)return;
    const ts=cells[0].textContent.trim();
    const dt=cells[1].textContent.trim();
    const ph=cells[2].querySelector('.td-val')?.textContent.trim()||cells[2].textContent.trim();
    const tb=cells[3].querySelector('.td-val')?.textContent.trim()||cells[3].textContent.trim();
    const lv=cells[4].querySelector('.td-val')?.textContent.trim()||cells[4].textContent.trim();
    csv+=`"${ts}","${dt}","${ph}","${tb}","${lv}"\n`;n++;
  });
  if(n===0){alert('Tidak ada data untuk diunduh.');return;}
  const tgl=document.getElementById('filter-tanggal').value||new Date().toISOString().slice(0,10);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`WQ_Log_${tgl}.csv`;a.click();
}
</script>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import{getDatabase,ref,onValue,remove}from"https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A",databaseURL:"https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app"});
const db=getDatabase(app);
const tbody=document.getElementById('table-body');
let unsub=null,tanggalHariIni='';

function tglLokal(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

window.hapusDataLog=function(key){
  if(!confirm('Hapus baris data ini?'))return;
  remove(ref(db,'SistemAir_Log/'+key)).catch(e=>alert('Gagal: '+e.message));
};

window.hapusSemuaDataLog=function(){
  if(!confirm('PERINGATAN!\n\nHapus SELURUH data log? Tindakan ini tidak dapat dibatalkan.'))return;
  Promise.all([remove(ref(db,'SistemAir_Log')),remove(ref(db,'SistemAir_Harian'))])
    .then(()=>alert('Seluruh data berhasil dihapus.'))
    .catch(e=>alert('Gagal: '+e.message));
};

window.muatDataDariFirebase=function(tgl){
  if(unsub){unsub();unsub=null;}
  unsub=onValue(ref(db,'SistemAir_Log/'+tgl),snap=>{
    tbody.innerHTML='';
    if(!snap.exists()){
      tbody.innerHTML=`<tr><td colspan="6"><div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-inbox"></i></div><div class="empty-title">Tidak ada data</div><div class="empty-sub">Belum ada rekaman untuk tanggal ${tgl}.</div></div></td></tr>`;
      document.getElementById('total-data-badge').textContent='0 data';
      return;
    }
    let rows=[];
    snap.forEach(child=>{const d=child.val();d._key=tgl+'/'+child.key;rows.push(d);});
    rows.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));

    rows.forEach(d=>{
      const dt=d.timestamp?new Date(d.timestamp*1000):new Date();
      const jam=String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')+':'+String(dt.getSeconds()).padStart(2,'0');
      const tglTampil=dt.toLocaleDateString('id-ID',{year:'numeric',month:'2-digit',day:'2-digit'});
      const ph=d.pH||0;
      const phOk=ph>=6.5&&ph<=8.5;
      const phBadge=`<span class="row-badge" style="background:${phOk?'var(--green-bg)':'var(--red-bg)'};color:${phOk?'var(--green)':'var(--red)'};border-color:${phOk?'var(--green-bd)':'var(--red-bd)'};">${phOk?'Optimal':'Critical'}</span>`;

      const tr=document.createElement('tr');
      tr.setAttribute('data-date',tgl);
      tr.setAttribute('data-time',jam);
      tr.innerHTML=`
        <td class="td-mono">${jam}</td>
        <td>${tglTampil}</td>
        <td><span class="td-val">${ph.toFixed(2)}</span>${phBadge}</td>
        <td><span class="td-val">${Math.round(d.turbidity||0)}</span><span class="td-unit">NTU</span></td>
        <td><span class="td-val">${Math.round(d.tinggiAir||0)}</span><span class="td-unit">cm</span></td>
        <td class="td-center"><button onclick="hapusDataLog('${d._key}')" class="del-btn" title="Hapus baris"><i class="fa-solid fa-trash-can"></i></button></td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('total-data-badge').textContent=rows.length+' data';
    if(typeof window.filterWaktu==='function')window.filterWaktu();
  });
};

window.gantiTanggal=function(){
  const v=document.getElementById('filter-tanggal').value;
  if(v)window.muatDataDariFirebase(v);
};

/* INIT */
tanggalHariIni=tglLokal(new Date());
document.getElementById('filter-tanggal').value=tanggalHariIni;
window.muatDataDariFirebase(tanggalHariIni);

/* AUTO MIDNIGHT RESET + AUTO CSV */
setInterval(()=>{
  const now=new Date();
  const today=tglLokal(now);
  if(now.getHours()===23&&now.getMinutes()===59&&now.getSeconds()===55)unduhCSV();
  if(today!==tanggalHariIni){
    tanggalHariIni=today;
    const inp=document.getElementById('filter-tanggal');
    if(inp.value<today){inp.value=today;window.muatDataDariFirebase(today);}
  }
},1000);
</script>
</body>
</html>
