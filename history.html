<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Data Sistem Air</title>
    <style>
        /* CSS Sederhana agar tampilan rapi */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .controls input[type="date"], .controls button { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-export { background-color: #28a745; color: white; border: none; cursor: pointer; transition: 0.3s; }
        .btn-export:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; }
        tr:hover { background-color: #f1f1f1; }
        .empty-msg { text-align: center; padding: 20px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Riwayat Log Sistem Akuarium</h2>
    
    <div class="controls">
        <div>
            <label for="tanggalFilter"><strong>Pilih Tanggal: </strong></label>
            <input type="date" id="tanggalFilter">
        </div>
        <button class="btn-export" onclick="exportTableToCSV('Data_Akuarium.csv')">📥 Export CSV</button>
    </div>

    <div style="max-height: 500px; overflow-y: auto;">
        <table id="logTable">
            <thead>
                <tr>
                    <th>Waktu (Jam)</th>
                    <th>pH Air</th>
                    <th>Kekeruhan (NTU)</th>
                    <th>Tinggi Air (cm)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    // 1. IMPORT FIREBASE V9
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 2. MASUKKAN CONFIG FIREBASE ANDA DI SINI!
    const firebaseConfig = {
        apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", // Sesuaikan API Key Anda
        databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-air-anda", // Opsional, sesuaikan jika ada
    };

    // 3. INISIALISASI FIREBASE
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 4. DEKLARASI ELEMEN HTML
    const dateInput = document.getElementById('tanggalFilter');
    const tableBody = document.getElementById('tableBody');

    // Dapatkan tanggal hari ini dengan format YYYY-MM-DD
    function getTodayString() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    // Set kalender bawaan ke hari ini
    dateInput.value = getTodayString();
    
    // Tarik data saat halaman pertama kali dibuka
    fetchDataFromFirebase(dateInput.value);

    // Tarik data baru ketika user mengganti tanggal di kalender
    dateInput.addEventListener('change', (e) => {
        fetchDataFromFirebase(e.target.value);
    });

    // 5. FUNGSI MENARIK DATA DARI FIREBASE BERDASARKAN TANGGAL
    let currentListener = null; // Menyimpan referensi listener aktif
    
    function fetchDataFromFirebase(tanggalPilih) {
        // Path sesuai dengan struktur ESP32 yang baru: SistemAir_Log/YYYY-MM-DD
        const logRef = ref(db, `SistemAir_Log/${tanggalPilih}`);
        
        tableBody.innerHTML = '<tr><td colspan="4" class="empty-msg">Memuat data dari server...</td></tr>';

        onValue(logRef, (snapshot) => {
            tableBody.innerHTML = ''; // Bersihkan tabel
            
            if (snapshot.exists()) {
                const data = snapshot.val();
                
                // Ubah object Firebase menjadi array agar bisa diurutkan berdasarkan timestamp
                const dataArray = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));

                // Urutkan data dari yang paling baru (Descending)
                dataArray.sort((a, b) => b.timestamp - a.timestamp);

                // Masukkan data ke dalam tabel
                dataArray.forEach(item => {
                    // Konversi Timestamp UNIX ke Jam lokal
                    const dateObj = new Date(item.timestamp * 1000);
                    const jam = String(dateObj.getHours()).padStart(2, '0');
                    const menit = String(dateObj.getMinutes()).padStart(2, '0');
                    const detik = String(dateObj.getSeconds()).padStart(2, '0');
                    const waktuFormat = `${jam}:${menit}:${detik}`;

                    const row = `<tr>
                        <td>${waktuFormat}</td>
                        <td>${item.pH.toFixed(2)}</td>
                        <td>${item.turbidity}</td>
                        <td>${item.tinggiAir.toFixed(1)}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } else {
                tableBody.innerHTML = `<tr><td colspan="4" class="empty-msg">Tidak ada data untuk tanggal ${tanggalPilih}</td></tr>`;
            }
        });
    }

    // 6. FUNGSI EXPORT KE CSV (Dipanggil oleh tombol Export)
    window.exportTableToCSV = function(filename) {
        const csv = [];
        const rows = document.querySelectorAll("table tr");
        
        for (let i = 0; i < rows.length; i++) {
            const row = [], cols = rows[i].querySelectorAll("td, th");
            for (let j = 0; j < cols.length; j++) 
                row.push(cols[j].innerText);
            csv.push(row.join(","));
        }

        downloadCSV(csv.join("\n"), `Log_${dateInput.value}.csv`);
    }

    function downloadCSV(csv, filename) {
        let csvFile;
        let downloadLink;

        csvFile = new Blob([csv], {type: "text/csv"});
        downloadLink = document.createElement("a");
        downloadLink.download = filename;
        downloadLink.href = window.URL.createObjectURL(csvFile);
        downloadLink.style.display = "none";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }

    // ==========================================
    // 7. FITUR AUTOSAVE JAM 23:59:50 (OPSIONAL)
    // ==========================================
    // Fitur ini HANYA BEKERJA jika halaman web ini sedang DIBUKA/AKTIF di browser.
    setInterval(() => {
        const now = new Date();
        // Cek apakah waktu menunjukkan jam 23:59:50 malam
        if (now.getHours() === 23 && now.getMinutes() === 59 && now.getSeconds() === 50) {
            console.log("Mengekspor otomatis data akhir hari...");
            // Ganti nama file otomatis dengan tanggal hari ini
            window.exportTableToCSV(`AutoSave_Log_${getTodayString()}.csv`);
        }
    }, 1000); // Mengecek setiap 1 detik

</script>

</body>
</html>
