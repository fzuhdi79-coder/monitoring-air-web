<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") !== "sukses") { window.location.href = "login.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Log - WQ System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-droplet" style="color: #3b82f6;"></i> WQ-SYSTEM</div>
        <div class="nav-links">
            <a href="index.html">Overview</a>
            <a href="speedometer.html">Gauges</a>
            <a href="grafik.html">Analytics</a>
            <a href="history.html" class="active">Data Log</a>
            <a href="#" class="btn-logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="page-title">
                <h1>Database Entry Log</h1>
                <p>Riwayat parameter kualitas air yang terekam pada sistem cloud</p>
            </div>
        </div>

        <div class="table-container">
            <div class="header-action">
                <div class="section-title" style="margin:0"><i class="fa-solid fa-server" style="color: var(--primary-blue)"></i> Live Records Storage</div>
                <button class="btn-export" onclick="exportCSV()"><i class="fa-solid fa-download"></i> EXPORT TO CSV</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Date</th>
                            <th>pH Level</th>
                            <th>Turbidity (NTU)</th>
                            <th>Water Level (cm)</th>
                        </tr>
                    </thead>
                    <tbody id="badan-tabel"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function logout() { sessionStorage.removeItem("statusLogin"); window.location.href = "login.html"; }
        function exportCSV() {
            let csv = []; let rows = document.querySelectorAll("table tr");
            for(let i=0; i<rows.length; i++) {
                let cols = rows[i].querySelectorAll("td, th"), row = [];
                for(let j=0; j<cols.length; j++) row.push(cols[j].innerText);
                csv.push(row.join(","));
            }
            let a = document.createElement("a");
            a.href = window.URL.createObjectURL(new Blob([csv.join("\n")], {type: "text/csv"}));
            a.download = "WQ_System_Log.csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";
        initializeApp({ apiKey: "AIzaSyDps5vc8pREiwr3BrNbX1k7xN1zleMZR2A", databaseURL: "https://realtime-database-5c956-default-rtdb.asia-southeast1.firebasedatabase.app" });
        
        let tb = document.getElementById('badan-tabel'), cnt = 0;
        onValue(ref(getDatabase(), 'SistemAir'), (snapshot) => {
            if (snapshot.exists()) {
                let d = snapshot.val(), now = new Date();
                let time = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
                let date = String(now.getDate()).padStart(2,'0')+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+now.getFullYear();

                let tr = document.createElement('tr');
                let phColor = (d.pH < 6.5 || d.pH > 8.5) ? 'var(--color-danger)' : 'var(--color-safe)';
                
                tr.innerHTML = `
                    <td style="color: var(--text-muted); font-weight: normal;">${time}</td>
                    <td>${date}</td>
                    <td style="font-weight:800; color:${phColor}">${(d.pH || 0).toFixed(2)}</td>
                    <td>${Math.round(d.turbidity || 0)} NTU</td>
                    <td>${Math.round(d.tinggiAir || 0)} cm</td>
                `;
                tb.insertBefore(tr, tb.firstChild); cnt++;
                if(cnt > 50) tb.removeChild(tb.lastChild);
            }
        });
    </script>
</body>
</html>
