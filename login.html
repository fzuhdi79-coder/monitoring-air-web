<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>if (sessionStorage.getItem("statusLogin") === "sukses") { window.location.href = "index.html"; }</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login - Water Monitor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-droplet" style="color: #3b82f6;"></i> WQ-SYSTEM</div>
    </nav>

    <div class="container login-wrapper">
        <div class="login-box">
            <h2>Authentication</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Masuk ke sistem monitoring utama</p>
            
            <div id="pesan-error" class="error-msg"><i class="fa-solid fa-circle-exclamation"></i> Kredensial tidak valid.</div>

            <input type="text" id="username" class="form-control" placeholder="ID Pengguna" onkeypress="cekEnter(event)">
            <input type="password" id="password" class="form-control" placeholder="Kata Sandi" onkeypress="cekEnter(event)">
            
            <button class="btn-submit" onclick="prosesLogin()">Akses Sistem</button>
        </div>
    </div>

    <script>
        function prosesLogin() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            
            // SILAKAN GANTI USERNAME DAN PASSWORD DI SINI:
            if (u === "admin" && p === "1234") {
                sessionStorage.setItem("statusLogin", "sukses");
                window.location.href = "index.html";
            } else {
                document.getElementById('pesan-error').style.display = "block";
            }
        }
        function cekEnter(e) { if(e.key === "Enter") prosesLogin(); }
    </script>
</body>
</html>
