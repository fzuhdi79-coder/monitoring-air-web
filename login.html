<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Monitoring Air</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-leaf" style="color: #2563eb;"></i> WATER QUALITY MONITORING</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="speedometer.html">Speedometer</a>
            <a href="grafik.html">Grafik</a>
            <a href="history.html">History</a>
        </div>
    </nav>

    <div class="container login-wrapper">
        <div class="login-box">
            <h2><i class="fa-solid fa-user-shield"></i> Login Admin</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Masukkan kredensial untuk mengakses fitur admin.</p>
            
            <div id="pesan-error" class="error-msg">Username atau Password salah!</div>

            <input type="text" id="username" class="form-control" placeholder="Username (contoh: admin)">
            <input type="password" id="password" class="form-control" placeholder="Password (contoh: 1234)">
            
            <button class="btn-submit" onclick="prosesLogin()">Masuk</button>
        </div>
    </div>

    <script>
        function prosesLogin() {
            let user = document.getElementById('username').value;
            let pass = document.getElementById('password').value;
            let errorMsg = document.getElementById('pesan-error');

            // --- ATUR USERNAME DAN PASSWORD DI SINI ---
            if (user === "admin" && pass === "1234") {
                // Simpan kunci sukses login di browser
                sessionStorage.setItem("statusLogin", "sukses");
                // Arahkan ke halaman yang dilindungi
                window.location.href = "index.html"; 
            } else {
                // Tampilkan pesan error
                errorMsg.style.display = "block";
            }
        }
    </script>
</body>
</html>
