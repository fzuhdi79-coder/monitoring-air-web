<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script>
        // Jika SUDAH login, dilarang masuk halaman login lagi (langsung ke dashboard)
        if (sessionStorage.getItem("statusLogin") === "sukses") { window.location.href = "index.html"; }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Monitoring</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=final">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand"><i class="fa-solid fa-leaf" style="color: #2563eb;"></i> WATER QUALITY MONITORING</div>
    </nav>

    <div class="container login-wrapper">
        <div class="login-box">
            <h2><i class="fa-solid fa-user-shield"></i> Login Admin</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Masukkan kredensial sistem</p>
            
            <div id="pesan-error" class="error-msg">Username atau Password salah!</div>

            <input type="text" id="username" class="form-control" placeholder="Masukkan Username" onkeypress="cekEnter(event)">
            <input type="password" id="password" class="form-control" placeholder="Masukkan Password" onkeypress="cekEnter(event)">
            
            <button class="btn-submit" onclick="prosesLogin()">Masuk ke Dashboard</button>
        </div>
    </div>

    <script>
        function prosesLogin() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            
            if (u === "roy" && p === "1986") {
                sessionStorage.setItem("statusLogin", "sukses");
                window.location.href = "index.html";
            } else {
                document.getElementById('pesan-error').style.display = "block";
            }
        }
        function cekEnter(e) { if(e.key === "Enter") prosesLogin(); }
    </script>
</body>
</html>
