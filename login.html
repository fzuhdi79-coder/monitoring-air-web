<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<script>if(sessionStorage.getItem("statusLogin")==="sukses"){window.location.href="index.html";}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — WQ System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;font-size:16px;}
body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  background:#fafafa;
  color:#0a0a0a;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  -webkit-font-smoothing:antialiased;
}

/* ── CARD ── */
.card{
  width:100%;
  max-width:400px;
  background:#ffffff;
  border:1px solid #e5e5e5;
  border-radius:12px;
  padding:40px;
}

/* ── HEADER ── */
.logo{
  display:flex;align-items:center;gap:9px;
  margin-bottom:32px;
}
.logo-icon{
  width:28px;height:28px;border-radius:7px;
  background:#0a0a0a;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-icon svg{width:13px;height:13px;fill:none;}
.logo-text{font-size:14px;font-weight:500;color:#0a0a0a;letter-spacing:-.01em;}

.card-title{
  font-size:18px;font-weight:500;letter-spacing:-.025em;
  color:#0a0a0a;margin-bottom:6px;
}
.card-sub{font-size:13.5px;color:#737373;font-weight:400;line-height:1.5;margin-bottom:28px;}

/* ── ERROR ── */
.err{
  display:none;
  align-items:center;gap:8px;
  padding:10px 12px;
  border-radius:7px;
  border:1px solid #fecaca;
  background:#fff5f5;
  font-size:13px;color:#b91c1c;
  margin-bottom:16px;
}
.err.on{display:flex;}
.err.shake{animation:shake .35s ease;}

/* ── FORM ── */
.fields{display:flex;flex-direction:column;gap:16px;margin-bottom:20px;}

.field label{
  display:block;
  font-size:13px;font-weight:500;
  color:#0a0a0a;
  margin-bottom:6px;
}

.inp-wrap{position:relative;}
.inp-wrap input{
  width:100%;
  border:1px solid #e5e5e5;
  border-radius:7px;
  padding:10px 13px;
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:400;
  color:#0a0a0a;
  background:#ffffff;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;
}
.inp-wrap input::placeholder{color:#a3a3a3;}
.inp-wrap input:hover{border-color:#d4d4d4;}
.inp-wrap input:focus{
  border-color:#0a0a0a;
  box-shadow:0 0 0 3px rgba(10,10,10,.06);
}

.eye-btn{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:3px;
  color:#a3a3a3;transition:color .15s;display:flex;
}
.eye-btn:hover{color:#525252;}

/* ── BUTTON ── */
.btn-primary{
  width:100%;padding:10px;
  background:#0a0a0a;
  border:1px solid #0a0a0a;
  border-radius:7px;
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:500;
  color:#ffffff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s,opacity .15s,transform .1s;
  letter-spacing:-.01em;
}
.btn-primary:hover{background:#262626;border-color:#262626;}
.btn-primary:active{transform:scale(.99);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── FOOTER ── */
.card-footer{
  margin-top:24px;
  padding-top:20px;
  border-top:1px solid #f0f0f0;
  display:flex;align-items:center;justify-content:space-between;
}
.status-row{display:flex;align-items:center;gap:6px;}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:#22c55e;
}
.status-text{font-size:12px;color:#a3a3a3;}
.footer-brand{font-size:12px;color:#d4d4d4;}

/* ── PAGE FOOTER ── */
.page-foot{
  margin-top:24px;
  font-size:12px;color:#d4d4d4;
  text-align:center;
}

/* ── SPINNER ── */
.spinner{
  width:14px;height:14px;
  border:1.5px solid rgba(255,255,255,.35);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
}

@keyframes shake{
  0%,100%{transform:none;}
  20%{transform:translateX(-5px);}
  40%{transform:translateX(5px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .card{padding:28px 24px;border-radius:10px;}
}
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3C9.8 3 8 5.2 8 8.5C8 11 9.4 13.1 11.5 14.2L11 17H13L12.5 14.2C14.6 13.1 16 11 16 8.5C16 5.2 14.2 3 12 3Z" fill="white"/>
        <rect x="10" y="17" width="4" height="2.5" rx="1" fill="white" opacity=".55"/>
      </svg>
    </div>
    <span class="logo-text">WQ System</span>
  </div>

  <div class="card-title">Masuk ke akun Anda</div>
  <div class="card-sub">Masukkan kredensial operator untuk mengakses dashboard.</div>

  <div class="err" id="err">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r=".6" fill="currentColor"/>
    </svg>
    <span>ID Operator atau kata sandi salah.</span>
  </div>

  <div class="fields">
    <div class="field">
      <label for="username">ID Operator</label>
      <div class="inp-wrap">
        <input type="text" id="username" placeholder="Masukkan ID Anda" autocomplete="username" onkeypress="onEnter(event)">
      </div>
    </div>
    <div class="field">
      <label for="password">Kata Sandi</label>
      <div class="inp-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeypress="onEnter(event)" style="padding-right:38px;">
        <button class="eye-btn" type="button" onclick="togglePwd()" aria-label="Tampilkan kata sandi">
          <svg id="eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <button class="btn-primary" id="btn" onclick="doLogin()">
    <span id="btn-label">Masuk</span>
  </button>

  <div class="card-footer">
    <div class="status-row">
      <span class="status-text">Smart Aquarium Monitoring System</span>
    </div>
    <span class="footer-brand">v2.1.0</span>
  </div>

</div>

<div class="page-foot">&copy; 2026 WQ-SYSTEM &middot; ZudiJago</div>

<script>
const eyeOpen=`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const eyeOff=`<path d="M17.94 17.94A10 10 0 0 1 12 20C5 20 1 12 1 12a18 18 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

function togglePwd(){
  const p=document.getElementById('password');
  const e=document.getElementById('eye');
  const show=p.type==='password';
  p.type=show?'text':'password';
  e.innerHTML=show?eyeOff:eyeOpen;
}

function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('btn');
  const lbl=document.getElementById('btn-label');

  if(u==='lemah'&&p==='teles'){
    btn.disabled=true;
    lbl.textContent='Memproses...';
    btn.insertAdjacentHTML('beforeend','<div class="spinner"></div>');
    setTimeout(()=>{
      sessionStorage.setItem('statusLogin','sukses');
      window.location.href='index.html';
    },700);
  } else {
    err.classList.remove('shake');
    void err.offsetWidth;
    err.classList.add('on','shake');
    document.getElementById('password').value='';
    document.getElementById('password').focus();
  }
}

function onEnter(e){if(e.key==='Enter')doLogin();}
</script>
</body>
</html>
